<!DOCTYPE html>
<html>
    <head>
        <meta charset=utf-8>
        <title>My Three.js app</title>
        <style type="text/css">
            div#canvas-frame {
                border: none;
                cursor: pointer;
                width: 100%;
                height: 600px;
                background-color: #ffffff;
            }
        </style>
        <script type="text/javascript" src="node_modules/three/build/three.js"></script>
        <script type="text/javascript" src="assets/scripts/stat.js"></script>
        <script>
            //兼容性处理
            let requestAnimationFrame = window.requestAnimationFrame
                    || window.mozRequestAnimationFrame
                    || window.webkitRequestAnimationFrame
                    || window.msRequestAnimationFrame;
            window.requestAnimationFrame = requestAnimationFrame;

            let renderer = null;    //渲染器
            let camera = null;      //相机
            let scene = null;       //场景
            let light = null;       //光源
            let loader = null;      //加载
            let mesh = null;        //要绘制的物体

            let stat = null;       //性能
            let id = null;      //循环渲染的id

            let material = new THREE.MeshNormalMaterial({
                // specular: 0xffff00,
                // shininess: 10,
                // color: 0xff0000,
                // emissive: 0x0000ff
                // wireframe: true,
                // side: THREE.BackSide
            });

            let width = null;
            let height = null;

            //初始化性能工具
            let initStart = function() {
                stat = new Stats();
                stat.domElement.style.position = 'absolute';
                stat.domElement.style.right = '0px';
                stat.domElement.style.top = '0px';
                document.body.appendChild(stat.domElement);
            }

            //初始化渲染器
            let initRenderer = function(){
                width = document.getElementById('mainCanvas').clientWidth;
                height = document.getElementById('mainCanvas').clientHeight;
                renderer = new THREE.WebGLRenderer({
                    canvas: document.getElementById('mainCanvas'),
                    antialias: true
                });
                // renderer.setSize(width, height);
                // document.getElementById('canvas-frame').appendChild(renderer.domElement);
                renderer.setClearColor(0x000000, 1.0);
            };

            //初始化相机
            let initCamera = function(){
                // //透视相机
                // camera = new THREE.PerspectiveCamera(45, width/height, 1, 1000);
                // camera.position.set(0, 0, 5);

                //正交相机
                camera = new THREE.OrthographicCamera(-5, 5, 3.75, -3.75, 0.1, 100);
                camera.position.set(25, 25, 25);
                camera.lookAt(new THREE.Vector3(0, 0, 0));
            };

            //初始化场景
            let initScene = function(){
                scene = new THREE.Scene();
            };

            //初始化光源
            let initLight = function(){
                light = new THREE.PointLight(0xffffff, 1.0, 100);
                light.position.set(10, 15, 5);
                scene.add(light);
            };

            //加载字体
            let loadFont = function() {
                loader = new THREE.FontLoader();
                loader.load('assets/fonts/helvetiker_regular.typeface.json', function(font){
                    mesh = new THREE.Mesh(new THREE.TextGeometry('Hello', {
                        font: font,
                        size: 1,
                        height: 1
                    }), material);
                    scene.add(mesh);
                })
            }

            //加载材质图片
            let loadImage = function() {
                // let texture = THREE.ImageUtils.loadTexture('assets/textures/' + name + '.png', function(img) {
                //     console.log();
                // });
                // material = new THREE.MeshLambertMaterial({
                //     map: texture
                // });
                material = [];
                for(let i = 0; i < 6; i++){
                    let texture = THREE.ImageUtils.loadTexture('assets/textures/b'+ (i + 1) +'.png');
                    texture.wrapS = texture.wrapT = THREE.RepeatWrapping;
                    texture.repeat.set(4, 4);
                    material.push(new THREE.MeshBasicMaterial({
                        map: texture,
                        overdraw: true
                    }))
                }
            }

            //绘制立方体
            let drawObj = function(){
                mesh = new THREE.Mesh(new THREE.CubeGeometry(5, 5, 5),new THREE.MeshFaceMaterial(material));
                // cube.position.set(0, 0, 0);
                scene.add(mesh);
            };

            //绘制平面
            let drawPlane = function() {
                mesh = new THREE.Mesh(new THREE.PlaneGeometry(2, 4, 2, 2),material);
                scene.add(mesh);
            };

            //绘制球体
            let drawSphere = function() {
                mesh = new THREE.Mesh(new THREE.SphereGeometry(3, 20, 20),material);
                scene.add(mesh);
            };

            //绘制圆形
            let drawCircle = function() {
                mesh = new THREE.Mesh(new THREE.CircleGeometry(3, 20, 0, Math.PI / 3),material);
                scene.add(mesh);
            };

            //绘制圆柱体
            let drawCylinder = function() {
                mesh = new THREE.Mesh(new THREE.CylinderGeometry(2, 3, 4, 20, 5),material);
                scene.add(mesh);
            };

            //绘制正四面体
            let drawTetrahedron = function(){
                mesh = new THREE.Mesh(new THREE.TetrahedronGeometry(2),material);
                scene.add(mesh);
            };

            //绘制正八面体
            let drawOctahedron = function(){
                mesh = new THREE.Mesh(new THREE.OctahedronGeometry(2),material);
                scene.add(mesh);
            };

            //绘制正二十面体
            let drawIcosahedron = function(){
                mesh = new THREE.Mesh(new THREE.IcosahedronGeometry(3),material);
                scene.add(mesh);
            };

            //绘制圆环面
            drawTorus = function(){
                mesh = new THREE.Mesh(new THREE.TorusGeometry(3, 1, 40, 40, Math.PI),material);
                scene.add(mesh);
            };

            //绘制圆环结
            drawTorusKnot = function(){
                mesh = new THREE.Mesh(new THREE.TorusKnotGeometry(2, 0.5, 60, 8, 5, 5),material);
                scene.add(mesh);
            };

            //绘制自定义图形
            drawCustom = function(){
                let geometry = new THREE.Geometry();

                geometry.vertices.push(new THREE.Vector3(-1, 2, -1));
                geometry.vertices.push(new THREE.Vector3(1, 2, -1));
                geometry.vertices.push(new THREE.Vector3(1, 2, 1));
                geometry.vertices.push(new THREE.Vector3(-1, 2, 1));
                
                geometry.vertices.push(new THREE.Vector3(-2, 0, -2));
                geometry.vertices.push(new THREE.Vector3(2, 0, -2));
                geometry.vertices.push(new THREE.Vector3(2, 0, 2));
                geometry.vertices.push(new THREE.Vector3(-2, 0, 2));

                geometry.faces.push(new THREE.Face3(0, 1, 3));
                geometry.faces.push(new THREE.Face3(1, 2, 3));

                geometry.faces.push(new THREE.Face3(4, 5, 6));
                geometry.faces.push(new THREE.Face3(5, 6, 7));

                geometry.faces.push(new THREE.Face3(1, 5, 6));
                geometry.faces.push(new THREE.Face3(6, 2, 1));
                geometry.faces.push(new THREE.Face3(2, 6, 7));
                geometry.faces.push(new THREE.Face3(7, 3, 2));
                geometry.faces.push(new THREE.Face3(3, 7, 0));
                geometry.faces.push(new THREE.Face3(7, 4, 0));
                geometry.faces.push(new THREE.Face3(0, 4, 5));
                geometry.faces.push(new THREE.Face3(0, 5, 1));

                mesh = new THREE.Mesh(geometry, material);
                scene.add(mesh);
            }

            //初始化坐标轴
            let initAxis = function() {
                let geometry = new THREE.Geometry();
                let p1 = new THREE.Vector3(0, 0, 0);
                let p2 = new THREE.Vector3(5, 0, 0);
                geometry.vertices.push(p1);
                geometry.vertices.push(p2);

                let line1 = new THREE.Line(geometry, new THREE.LineBasicMaterial({
                    color: 0xff0000, opacity: 1.0
                }));
                scene.add(line1);

                let line2 = new THREE.Line(geometry, new THREE.LineBasicMaterial({
                    color: 0x00ff00, opacity: 1.0
                }));
                line2.rotation.z = 90 * Math.PI / 180;
                scene.add(line2);

                let line3 = new THREE.Line(geometry, new THREE.LineBasicMaterial({
                    color: 0x00ccff, opacity: 1.0
                }));
                line3.rotation.y = -90 * Math.PI / 180;
                scene.add(line3);
            };

            // let config = 1;
            // let count = 1;
            let render = function(){
                stat.begin();

                // renderer.clear();
                mesh.rotation.y += Math.PI / 180 * 0.1;
                // mesh.scale.set(count, count, count);
                // count += config * 0.01;
                // if(count >= 2 || count <= 0.1){
                //     config *= -1;
                // }
                renderer.render(scene, camera);
                id = requestAnimationFrame(render);

                stat.end();
            }

            let init = function(){

                initStart();

                initScene();
                initRenderer();
                initCamera();
                initLight();
                loadImage();
                initAxis();
                drawObj();
                // drawPlane();
                // drawSphere();
                // drawCircle();
                // drawCylinder();
                // drawIcosahedron();
                // drawTorus();
                // drawTorusKnot();
                // loadFont();
                // drawCustom();
                // renderer.clear();
                // renderer.render(scene, camera);
                render();
            };

            let stop = function() {
                if(id !== null){
                    cancelAnimationFrame(id);
                    id = null;
                }
            }
        </script>
    </head>
    <body onload="init();">
        <canvas id="mainCanvas" width="400px" height="300px"></canvas>
    </body>
</html>
