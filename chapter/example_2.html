<!DOCTYPE html>
<html>
    <head>
        <meta charset=utf-8>
        <title>Animation</title>
        <style type="text/css">
        </style>
        <script type="text/javascript" src="../node_modules/three/build/three.js"></script>
        <script type="text/javascript" src="../assets/scripts/stat.js"></script>
        <script>
            //动画样本

            //兼容性处理
            let requestAnimationFrame = window.requestAnimationFrame
                    || window.mozRequestAnimationFrame
                    || window.webkitRequestAnimationFrame
                    || window.msRequestAnimationFrame;
            window.requestAnimationFrame = requestAnimationFrame;

            let renderer = null;    //渲染器
            let camera = null;      //相机
            let scene = null;       //场景
            let light = null;       //光源
            
            let stat = null;       //性能
            let id = null;      //循环渲染的id

            let ballMesh = null;        //弹球
            let ballRadius = 0.5;       //弹球半径
            let v = 0;      //弹球速度
            let a = -0.01;       //弹球加速度
            let maxHeight = 5;      //弹球的最高高度
            let isMoving = false;      //弹球是否在移动

            let isPause = false;      //暂停

            // let material = new THREE.MeshNormalMaterial({
            //     // specular: 0xffff00,
            //     // shininess: 10,
            //     // color: 0xff0000,
            //     // emissive: 0x0000ff
            //     // wireframe: true,
            //     // side: THREE.BackSide
            // });

            let width = null;
            let height = null;

            //初始化性能工具
            let initStart = function() {
                stat = new Stats();
                stat.domElement.style.position = 'absolute';
                stat.domElement.style.right = '0px';
                stat.domElement.style.top = '0px';
                document.body.appendChild(stat.domElement);
            }

            //初始化渲染器
            let initRenderer = function(){
                width = document.getElementById('mainCanvas').clientWidth;
                height = document.getElementById('mainCanvas').clientHeight;
                renderer = new THREE.WebGLRenderer({
                    canvas: document.getElementById('mainCanvas'),
                    antialias: true
                });
                renderer.setClearColor(0x000000, 1.0);
            };

            //初始化相机
            let initCamera = function(){
                // //透视相机
                // camera = new THREE.PerspectiveCamera(45, width/height, 1, 1000);
                // camera.position.set(0, 0, 5);

                //正交相机
                camera = new THREE.OrthographicCamera(-5, 5, 3.75, -3.75, 0.1, 100);
                camera.position.set(5, 10, 20);
                camera.lookAt(new THREE.Vector3(0, 3, 0));
            };

            //初始化场景
            let initScene = function(){
                scene = new THREE.Scene();
            };

            //初始化光源
            let initLight = function(){
                light = new THREE.DirectionalLight(0xffffff);
                light.position.set(10, 10, 15);
                scene.add(light);
            };

            //绘制地面
            let drawPlane = function() {
                let texture = new THREE.TextureLoader().load('../assets/textures/b10.png');
                texture.wrapS = texture.wrapT = THREE.RepeatWrapping;
                texture.repeat.set(4, 4);
                let plane = new THREE.Mesh(new THREE.PlaneGeometry(5, 5),
                    new THREE.MeshLambertMaterial({map: texture})
                );
                plane.rotation.x = -Math.PI / 2;
                scene.add(plane);
            };

            //绘制弹球
            let drawSphere = function() {
                ballMesh = new THREE.Mesh(new THREE.SphereGeometry(ballRadius, 20, 20),
                    new THREE.MeshLambertMaterial({
                        color: 0xff0000
                    })
                );
                ballMesh.position.y = ballRadius;
                scene.add(ballMesh);
            };

            //初始化坐标轴
            let initAxis = function() {
                let geometry = new THREE.Geometry();
                let p1 = new THREE.Vector3(0, 0, 0);
                let p2 = new THREE.Vector3(5, 0, 0);
                geometry.vertices.push(p1);
                geometry.vertices.push(p2);

                let line1 = new THREE.Line(geometry, new THREE.LineBasicMaterial({
                    color: 0xff0000, opacity: 1.0
                }));
                scene.add(line1);

                let line2 = new THREE.Line(geometry, new THREE.LineBasicMaterial({
                    color: 0x00ff00, opacity: 1.0
                }));
                line2.rotation.z = 90 * Math.PI / 180;
                scene.add(line2);

                let line3 = new THREE.Line(geometry, new THREE.LineBasicMaterial({
                    color: 0x00ccff, opacity: 1.0
                }));
                line3.rotation.y = -90 * Math.PI / 180;
                scene.add(line3);
            };

            let drawDrop = function(){
                if(isMoving){

                    let x = v + a / 2;
                    v += a;
                    ballMesh.position.y += x;

                    if(ballMesh.position.y <= ballRadius){
                        v *= -0.98;

                        if(Math.abs(v) <= 0){
                            isMoving = false;
                            ballMesh.position.y = ballRadius;
                        }
                    }

                }
            };

            let render = function(){
                stat.begin();

                if(!isPause){
                    drawDrop();
                }
                renderer.render(scene, camera);
                id = requestAnimationFrame(render);

                stat.end();
            }

            let init = function(){
                initStart();

                initScene();
                initRenderer();
                initCamera();
                initLight();
                initAxis();
                drawPlane();
                drawSphere();
                render();
            };

            let pauseOrResume = function(){
                if(isPause){
                    isPause = false;
                }else{
                    isPause = true;
                }
            };

            let stop = function() {
                isMoving = false;
                ballMesh.position.y = ballRadius;
                v = 0;
                renderer.render(scene, camera);
            }

            let drop = function(){
                isMoving = true;
                ballMesh.position.y = maxHeight;
                v = 0;
            }
        </script>
    </head>
    <body onload="init();">
        <canvas id="mainCanvas" width="800px" height="600px"></canvas>
        <button id="drop" onclick="drop()">Drop</button>
        <button id="stop" onclick="stop()">Stop</button>
        <button id="pause" onclick="pauseOrResume()">Pause</button>
    </body>
</html>
